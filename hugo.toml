baseURL = "https://dvshishkin.github.io/sizzling-facts_1/"
defaultContentLanguage = "ru"
defaultContentLanguageInSubdir = false

# Отключаем ненужные выходные форматы
disableKinds = ["taxonomy", "term"]

# Включаем теги для блога
[taxonomies]
  tag = "tags"

# ——— Языки ———————————————————————————————————————————————————

[languages]

  [languages.ru]
    languageCode = "ru"
    languageName = "Русский"
    title        = "Жареные факты"
    weight       = 1
    [languages.ru.params]
      description = "Иван Шишкин — шеф-повар, преподаватель, Гамбург. О еде, ферментации, городском собирательстве и познании через телесный опыт."
      author      = "Иван Шишкин"

  [languages.en]
    languageCode = "en"
    languageName = "English"
    title        = "Sizzling Facts"
    weight       = 2
    [languages.en.params]
      description = "Ivan Shishkin — chef, educator, Hamburg. On food, fermentation, urban foraging and learning through embodied experience."
      author      = "Ivan Shishkin"

# ——— Общие параметры ————————————————————————————————————————

[params]
  # Секции лендинга (порядок важен).
  # label убран — берётся из i18n по id.
  # absolute = true означает «не добавлять языковой префикс к href».
  [[params.sections]]
    id       = "about"
    href     = "/about/"

  [[params.sections]]
    id       = "interests"
    href     = "/#interests"

  [[params.sections]]
    id       = "projects"
    href     = "/projects/"

  [[params.sections]]
    id       = "portfolio"
    href     = "/portfolio/"

  [[params.sections]]
    id       = "blog"
    href     = "/blog/"
    absolute = true   # блог всегда на русском, без /en/ префикса

# ——— Сборка ——————————————————————————————————————————————————

[build]
  writeStats = true

[outputs]
  home    = ["HTML"]
  section = ["HTML"]
  page    = ["HTML"]
