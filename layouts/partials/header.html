<header class="site-header">
  <div class="container">
    <a href="{{ "/" | absLangURL }}" class="site-logo">{{ .Site.Title }}</a>
    <nav class="site-nav">
      {{- range .Site.Params.sections }}
      {{- if .absolute }}
      <a href="{{ .href | absURL }}"{{ if eq .id "blog" }} class="nav-blog"{{ end }}>{{ i18n .id }}</a>
      {{- else }}
      <a href="{{ .href | absLangURL }}"{{ if eq .id "blog" }} class="nav-blog"{{ end }}>{{ i18n .id }}</a>
      {{- end }}
      {{- end }}
    </nav>
    <div class="header-actions">
      <div class="lang-switch">
        {{- if .Translations }}
          {{- range .Translations }}
          <a href="{{ .Permalink }}" hreflang="{{ .Lang }}">{{ upper .Lang }}</a>
          {{- end }}
        {{- else }}
          {{- if eq .Lang "ru" }}
          <a href="{{ "/en/" | absURL }}" hreflang="en">EN</a>
          {{- else }}
          <a href="{{ "/" | absURL }}" hreflang="ru">RU</a>
          {{- end }}
        {{- end }}
      </div>
      <button class="nav-toggle" aria-label="{{ i18n `menu` }}">☰</button>
    </div>
  </div>
</header>
